# 仅信令 — 前端在 Cloudflare Pages（nes.zachuse.top）
# OpenCloudOS 9：
#   sudo certbot certonly --nginx -d signal.zachuse.top
#   sudo cp ... /etc/nginx/conf.d/contra-signal.conf
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name signal.zachuse.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name signal.zachuse.top;

    ssl_certificate /etc/letsencrypt/live/signal.zachuse.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/signal.zachuse.top/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 信令仅 WebSocket（WSS），HTTP/1.1 即可；无需 http2，也避免新版 nginx 弃用警告
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location / {
        return 404;
    }
}
