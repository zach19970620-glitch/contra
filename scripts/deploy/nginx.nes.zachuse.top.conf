# 安装前：
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo certbot certonly --nginx -d nes.zachuse.top
#   sudo cp scripts/deploy/nginx.nes.zachuse.top.conf /etc/nginx/sites-available/contra
#   sudo ln -sf /etc/nginx/sites-available/contra /etc/nginx/sites-enabled/contra
#   sudo nginx -t && sudo systemctl reload nginx
#
# 静态文件目录：/var/www/contra（见 scripts/deploy/README.md）

server {
    listen 80;
    listen [::]:80;
    server_name nes.zachuse.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nes.zachuse.top;

    ssl_certificate /etc/letsencrypt/live/nes.zachuse.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nes.zachuse.top/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/contra;
    index index.html;

    # SharedArrayBuffer（与 apps/web/public/_headers 一致）
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.wasm$ {
        types { application/wasm wasm; }
        default_type application/wasm;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
